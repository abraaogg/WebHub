<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link rel="shortcut icon" href="img/ajaw.webp" type="image/x-icon" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <script src="script.js" defer></script>
    <title>Animações GSAP</title>
  </head>
  <body>
    <div class="container">
      <div class="left">
        <h2 class="logo">logo.</h2>
        <h1 class="titulo">Módulo <span>GSAP</span> <br />Kinich</h1>
        <div class="content">
          <p>
            Kinich is a character from Genshin Impact, the open-world action RPG
            by HoYoverse. He’s associated with the <span>Dendro</span> element
            and comes from the region of Natlan.
          </p>
        </div>
        <div class="wiki-link">
          <a
            href="https://genshin-impact.fandom.com/pt-br/wiki/Kinich"
            target="_blank"
          >
            Conheça mais
            <img src="img/button-arrow.svg" alt="" />
          </a>
        </div>

        <footer>
          <div class="cards">
            <div class="card">
              Programação <img src="img/button-code.svg" alt="code icon" />
            </div>
            <div class="card">
              Desenvolvimento
              <img src="img/button-crown.svg" alt="crown icon" />
            </div>
            <div class="card">
              Design <img src="img/button-fire.svg" alt="fire icon" />
            </div>
          </div>
        </footer>
      </div>
      <div class="right">
        <img class="kinich" src="img/kinich1.png" alt="" />
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/gsap.min.js"></script>
  </body>
</html>
